<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cassini Dust Analyzer Explorer</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack-extra.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
</head>

<body>
    <header>
        <h1>Cassini Dust Analyzer Explorer</h1>
        <div id="mode-toggle-wrap" class="hidden">
            <span class="mode-label">Simple</span>
            <label class="mode-switch">
                <input type="checkbox" id="mode-advanced" aria-label="Toggle Advanced mode">
                <span class="mode-slider"></span>
            </label>
            <span class="mode-label">Advanced</span>
        </div>
        <div id="loading-banner">Loading data&hellip;</div>
        <div id="stats-bar" class="hidden">
            <span id="stat-total"></span>
            <span id="stat-filtered"></span>
            <span id="stat-selected"></span>
        </div>
    </header>

    <div id="filter-bar">
        <div class="filter-group filter-group-primary">
            <label>Category</label>
            <div id="filter-category-chips" class="category-chips"></div>
        </div>
        <div class="filter-group filter-group-primary">
            <label>Confidence</label>
            <input type="range" id="filter-confidence" min="0" max="1" step="0.01" value="0.5">
            <span id="filter-confidence-label">≥ 0.50</span>
        </div>
        <button id="btn-reset-filters">Reset</button>
        <div id="filter-advanced" class="filter-advanced">
            <div class="filter-group">
                <label>Chemical species</label>
                <select id="filter-species" multiple size="4"
                    title="Filter by element/compound (e.g. Carbon includes C, CO, CaCO₃)">
                    <option value="__none__" selected>None</option>
                    <option value="Carbon">Carbon</option>
                    <option value="Nitrogen">Nitrogen</option>
                    <option value="Oxygen">Oxygen</option>
                    <option value="Sodium">Sodium</option>
                    <option value="Silicon">Silicon</option>
                    <option value="Chlorine">Chlorine</option>
                    <option value="Potassium">Potassium</option>
                    <option value="Calcium">Calcium</option>
                    <option value="Iron">Iron</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Time Range</label>
                <div class="range-inputs">
                    <input type="range" id="filter-time-min" min="0" max="1" step="0.001" value="0">
                    <input type="range" id="filter-time-max" min="0" max="1" step="0.001" value="1">
                </div>
                <div class="range-labels">
                    <span id="filter-time-min-label">—</span>
                    <span id="filter-time-max-label">—</span>
                </div>
            </div>
            <div class="filter-group">
                <label>Radius (R<sub>sat</sub>)</label>
                <div class="range-inputs">
                    <input type="range" id="filter-rsat-min" min="0" max="160" step="0.5" value="0">
                    <input type="range" id="filter-rsat-max" min="0" max="160" step="0.5" value="160">
                </div>
                <div class="range-labels">
                    <span id="filter-rsat-min-label">0</span>
                    <span id="filter-rsat-max-label">160</span>
                </div>
            </div>
            <div class="filter-group">
                <label>Inclination (°)</label>
                <div class="range-inputs">
                    <input type="range" id="filter-inc-min" min="-65" max="65" step="1" value="-65">
                    <input type="range" id="filter-inc-max" min="-65" max="65" step="1" value="65">
                </div>
                <div class="range-labels">
                    <span id="filter-inc-min-label">-65°</span>
                    <span id="filter-inc-max-label">65°</span>
                </div>
            </div>
            <div class="filter-group download-group">
                <label>Export</label>
                <div class="download-buttons">
                    <button id="btn-download-metadata" title="Download filtered metadata as CSV">Metadata (CSV)</button>
                    <button id="btn-download-selected" title="Download selected spectrum">Selected spectrum</button>
                    <button id="btn-download-spectra" title="Download all filtered spectra (may take a moment)">Filtered
                        spectra</button>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard-container">
        <div id="widget-palette">
            <h3>Add Widgets</h3>
            <p class="palette-hint">Click to add, click again to remove · Drag to rearrange · Resize by corners</p>
            <div class="palette-widgets">
                <div class="palette-item" data-widget="saturn-map">
                    <span class="palette-icon">🪐</span>
                    <span>Saturn Map</span>
                </div>
                <div class="palette-item" data-widget="street-view">
                    <span class="palette-icon">👣</span>
                    <span>Street View</span>
                </div>
                <div class="palette-item" data-widget="spectrum">
                    <span class="palette-icon">📊</span>
                    <span>Mass Spectrum</span>
                </div>
                <div class="palette-item" data-widget="periodic">
                    <span class="palette-icon">⚛️</span>
                    <span>Periodic Table</span>
                </div>
                <div class="palette-item" data-widget="config">
                    <span class="palette-icon">⚙️</span>
                    <span>Category Config</span>
                </div>
            </div>
        </div>

        <div id="grid-container">
            <div class="grid-stack" id="dashboard-grid"></div>
        </div>
    </div>

    <!-- Widget templates (hidden, cloned when adding) -->
    <template id="tmpl-saturn-map">
        <div class="panel grid-widget" data-widget-type="saturn-map">
            <div class="panel-header">
                <span>Saturn Ring Plane — Top-Down View</span>
                <span class="panel-header-actions">
                    <span class="panel-hint">Scroll to zoom · Drag on map to pan · Drag header to move widget</span>
                    <button class="widget-remove" title="Remove widget">×</button>
                </span>
            </div>
            <div class="widget-body saturn-map-container"></div>
        </div>
    </template>
    <template id="tmpl-street-view">
        <div class="panel grid-widget" data-widget-type="street-view">
            <div class="panel-header">
                <span>Street View Navigator</span>
                <button class="widget-remove" title="Remove widget">×</button>
            </div>
            <div class="widget-body">
                <div id="street-view-controls">
                    <button class="sv-prev" title="Previous grain (←)">◀ Prev</button>
                    <div class="sv-info">
                        <div class="sv-position">—</div>
                        <div class="sv-detail"></div>
                    </div>
                    <button class="sv-next" title="Next grain (→)">Next ▶</button>
                </div>
                <div class="sv-sort-row">
                    <label>Walk by:</label>
                    <select class="sv-sort">
                        <option value="time">Time (chronological)</option>
                        <option value="radius">Radius (inner → outer)</option>
                        <option value="inclination">Inclination (S → N)</option>
                        <option value="enceladus">Distance to Enceladus</option>
                    </select>
                    <button class="sv-play" title="Auto-play (Space)">▶ Play</button>
                </div>
            </div>
        </div>
    </template>
    <template id="tmpl-spectrum">
        <div class="panel grid-widget" data-widget-type="spectrum">
            <div class="panel-header">
                <span>Mass Spectrum</span>
                <div class="panel-header-actions">
                    <span class="panel-hint spectrum-legend">Select elements in periodic table to show mass
                        markers</span>
                    <label class="toggle-label"><input type="checkbox" class="spectrum-log" checked> Log scale</label>
                    <label class="toggle-label"><input type="checkbox" class="spectrum-show-elements" checked> Element
                        markers</label>
                    <button class="widget-remove" title="Remove widget">×</button>
                </div>
            </div>
            <div class="widget-body spectrum-container"></div>
        </div>
    </template>
    <template id="tmpl-config">
        <div class="panel grid-widget" data-widget-type="config">
            <div class="panel-header">
                <span>Category Colors & Sizes</span>
                <span class="panel-header-actions">
                    <button class="config-reset" title="Reset to defaults">Reset</button>
                    <button class="widget-remove" title="Remove widget">×</button>
                </span>
            </div>
            <div class="widget-body config-outer">
                <div class="config-container"></div>
            </div>
        </div>
    </template>
    <template id="tmpl-periodic">
        <div class="panel grid-widget" data-widget-type="periodic">
            <div class="panel-header">
                <span>Periodic Table Filter</span>
                <span class="panel-header-actions">
                    <span class="panel-hint">Click elements to filter by mass peaks</span>
                    <button class="widget-remove" title="Remove widget">×</button>
                </span>
            </div>
            <div class="widget-body periodic-container"></div>
        </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack-all.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
